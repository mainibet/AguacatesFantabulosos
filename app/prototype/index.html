<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AwarenessApp</title>

<style>
:root {
  --bg: #f6f7fb;
  --card: #ffffff;
  --text: #111;
  --muted: rgba(0,0,0,0.6);

  --accent: #3a7afe;

  --bar-bg: #eeeeee;

  --threshold: #222;
  --border: #e0e0e0;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --text: #f2f2f2;
    --muted: rgba(255,255,255,0.6);

    --accent: #5b8cff;

    --bar-bg: #1c2029;

    --threshold: #ffffff;
    --border: #2a2f3a;
  }
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
}

.status {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 20px;
  border: 1px solid var(--accent);
  color: var(--accent);
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-top: 18px;
  text-align: center;
}

/* TITLE */
.title {
  font-size: 14px;
  margin-bottom: 10px;
}

/* SUBTEXT + ANIMATION */
.subtext {
  font-size: 13px;
  color: var(--muted);
}

.dots::after {
  content: '';
  animation: dots 1.4s infinite;
}

@keyframes dots {
  0% { content: ""; }
  25% { content: "."; }
  50% { content: ".."; }
  75% { content: "..."; }
  100% { content: ""; }
}

/* BAR */
.bar {
  margin: 18px 0;
  height: 18px;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  background: var(--bar-bg);
}

.fill {
  height: 100%;
  width: 0%;
  background: var(--accent);

  background-image: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.18),
    rgba(255,255,255,0.18) 6px,
    rgba(0,0,0,0.08) 6px,
    rgba(0,0,0,0.08) 12px
  );
}

/* THRESHOLD LINE */
.threshold-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--threshold);
  opacity: 0.8;
}

/* SLIDER */
.slider {
  width: 100%;
  margin-top: 10px;
}

/* LOG */
.log {
  margin-top: 18px;
  text-align: left;
}

.log-item {
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div>AwarenessApp</div>
    <div class="status">CONNECTED</div>
  </div>

  <!-- STATE -->
  <div class="card">
    <div class="title">CURRENT NOISE LEVEL</div>

    <div class="subtext dots">Monitoring environment</div>

    <div class="bar">
      <div id="fill" class="fill"></div>
      <div id="thresholdLine" class="threshold-line"></div>
    </div>
  </div>

  <!-- THRESHOLD -->
  <div class="card">
    <div>THRESHOLD</div>
    <input id="slider" type="range" min="40" max="100" value="75" class="slider">
    <div id="thresholdValue">75 dB</div>
  </div>

  <!-- LOG -->
  <div class="log">
    <div><b>EVENT LOG</b></div>
    <div id="logs"></div>
  </div>

</div>

<script>
let threshold = 75;
let logs = [];

const fillEl = document.getElementById("fill");
const logsEl = document.getElementById("logs");
const thresholdLine = document.getElementById("thresholdLine");

function getPercent(value) {
  return ((value - 40) / (100 - 40)) * 100;
}

/* SLIDER */
document.getElementById("slider").addEventListener("input", (e) => {
  threshold = Number(e.target.value);
  document.getElementById("thresholdValue").innerText = threshold + " dB";
  updateThresholdLine();
});

/* ALIGN THRESHOLD LINE */
function updateThresholdLine() {
  thresholdLine.style.left = getPercent(threshold) + "%";
}

/* LOG RENDER */
function renderLogs() {
  logsEl.innerHTML = "";
  logs.slice(0, 6).forEach(log => {
    const div = document.createElement("div");
    div.className = "log-item";
    div.innerText = log;
    logsEl.appendChild(div);
  });
}

/* ALERT LOG */
function addLog(value) {
  const time = new Date().toLocaleTimeString();
  logs.unshift(`[!] ${time} - ${value} dB exceeded threshold`);
  renderLogs();
}

/* EVENT SIMULATION (device sends only on trigger) */
setInterval(() => {
  const fakeValue = Math.floor(Math.random() * 100);

  fillEl.style.width = getPercent(fakeValue) + "%";

  if (fakeValue > threshold) {
    addLog(fakeValue);
  }
}, 2000);

/* INIT */
updateThresholdLine();
</script>

</body>
</html>
